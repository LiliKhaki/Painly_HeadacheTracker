<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 250"
     preserveAspectRatio="xMidYMid meet">

	<defs>
		<!-- Градиент для круга -->
		<radialGradient id="softGradient"
						cx="50%" cy="45%" r="70%"> 
			<stop offset="0%" stop-color="#8FC5AE"/>
			<stop offset="100%" stop-color="#3E7D62"/>
		</radialGradient>

		<!-- Лёгкая тень для текста -->
		<filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
			<feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.2)"/>
		</filter>
	</defs>

	<!-- Центральный круг -->
	<circle cx="100" cy="100" r="80"
			fill="url(#softGradient)" />

	<!-- Название приложения (ещё ниже) -->
	<text x="100" y="210" text-anchor="middle"
		  font-family="Arial, Helvetica, sans-serif"
		  font-size="34" fill="#2E5948" font-weight="600"
		  filter="url(#textShadow)">
		Painly
	</text>

	<!-- Подзаголовок -->
	<text x="100" y="230" text-anchor="middle"
		  font-family="Arial, Helvetica, sans-serif"
		  font-size="14" fill="#2E5948" font-weight="400"
		  filter="url(#textShadow)">
		your headache diary
	</text>

</svg>