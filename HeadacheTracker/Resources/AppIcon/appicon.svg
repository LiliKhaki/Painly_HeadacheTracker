<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">

	<defs>
		<!-- Радиальный градиент для фона -->
		<radialGradient id="backgroundRadial"
                        cx="50%" cy="50%" r="50%"
                        fx="50%" fy="50%">
			<stop offset="0%" stop-color="#F0F2F1"/>
			<stop offset="100%" stop-color="#A0B5A1"/>
		</radialGradient>

		<!-- Градиент для центрального круга -->
		<radialGradient id="circleGradient"
                        cx="50%" cy="50%" r="50%"
                        fx="50%" fy="50%">
			<stop offset="0%" stop-color="#70A088"/>
			<stop offset="100%" stop-color="#3E7D62"/>
		</radialGradient>
	</defs>

	<!-- Фон -->
	<rect x="0" y="0" width="1024" height="1024"
	
          fill="url(#backgroundRadial)" />

	<!-- Центральный круг (увеличен) -->
	<circle cx="512" cy="512" r="240"
            fill="url(#circleGradient)" />

</svg>
